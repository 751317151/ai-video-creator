server:
  port: 8081

spring:
  application:
    name: ai-video-creator
  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:avc}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:blackstar}
    driver-class-name: org.postgresql.Driver

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Spring AI (DeepSeek via OpenAI-compatible)
  ai:
    openai:
      api-key: ${LLM_API_KEY:sk-placeholder}
      base-url: ${LLM_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${LLM_MODEL:deepseek-chat}
          temperature: 0.7
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        initialize-schema: true

# RocketMQ
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:localhost:19876}
  producer:
    group: avc-producer-group
    send-message-timeout: 10000

# SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# Logging
logging:
  level:
    com.avc: DEBUG
    org.springframework.ai: INFO
    org.apache.rocketmq: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Application
avc:
  api-key: ${AVC_API_KEY:blackstar}
  rate-limit:
    max-requests: 60
    window-seconds: 60
  storage:
    type: ${STORAGE_TYPE:local}
    local-dir: ${STORAGE_LOCAL_DIR:./output}
    s3:
      endpoint-url: ${S3_ENDPOINT_URL:}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      bucket: ${S3_BUCKET:}
      region: ${S3_REGION:}
      prefix: ${S3_PREFIX:ai-video-creator}

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
  type-enums-package: com.avc.common.enums
